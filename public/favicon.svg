<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo escuro -->
  <rect width="100" height="100" fill="#0F0A1E" rx="20"/>
  
  <!-- Letra E estilizada -->
  <text x="50" y="72" font-family="Georgia, serif" font-size="65" font-weight="bold" fill="url(#gold)" text-anchor="middle">E</text>
</svg>
